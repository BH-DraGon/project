<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inno Tech Wellness Centre - Admin Authentication</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f0f4f8; }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-center items-center p-4 md:p-8 select-none">

    <div class="w-full max-w-[440px]">
        <div class="flex flex-col items-center mb-6 text-center">
            <h1 class="text-xl font-bold text-gray-800 tracking-wide">วิทยาลัยเทคนิคหาดใหญ่</h1>
            <p class="text-xs text-gray-400 font-medium uppercase tracking-wider mb-2">Hatyai Technical College</p>
            
            <div class="flex items-center space-x-2 mt-1">
                <span class="text-red-500 text-sm"><i class="fa-solid fa-shield-halved"></i></span>
                <span class="text-[11px] font-bold text-gray-500 uppercase tracking-wider">ระบบความปลอดภัยผู้ดูแลระบบ</span>
            </div>
        </div>

        <div class="bg-white rounded-3xl shadow-xl p-8 border border-gray-50 text-center">
            <div class="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl shadow-inner">
                <i class="fa-solid fa-lock"></i>
            </div>
            
            <h2 class="text-2xl font-bold text-gray-800 mb-2 tracking-wide">กรอกรหัสผ่าน</h2>
            <p class="text-xs text-gray-400 font-medium mb-6 leading-relaxed">
                กรุณาระบุรหัสผ่านผู้ดูแลระบบ (Admin PIN) เพื่อเข้าสู่หน้าจัดการระบบหลังบ้าน
            </p>

            <form id="adminAuthForm" class="space-y-4 text-left">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1.5 ml-1">รหัสผ่าน (Admin PIN)</label>
                    <div class="relative">
                        <input id="adminPin" type="password" maxlength="10" placeholder="กรอกรหัสผ่านยืนยันสิทธิ์" required class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-red-500 pr-10 text-center text-lg font-bold tracking-widest text-gray-800">
                        <span class="absolute right-4 top-3.5 text-gray-400"><i class="fa-solid fa-key"></i></span>
                    </div>
                </div>

                <div class="pt-2">
                    <button type="submit" class="w-full bg-red-500 hover:bg-red-600 text-white font-bold py-3.5 rounded-xl transition duration-200 shadow-md flex items-center justify-center gap-2">
                        <i class="fa-solid fa-right-to-bracket"></i>
                        ยืนยันและเข้าสู่หน้าจัดการ
                    </button>
                </div>

                <div class="flex items-center justify-center pt-4 text-xs font-semibold text-gray-400">
                    <a href="login.html" class="hover:text-emerald-600 hover:underline"><i class="fa-solid fa-arrow-left mr-1"></i> กลับไปหน้าเข้าสู่ระบบ</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        // กำหนดรหัสผ่านตั้งต้นไว้ตรงนี้
        const MASTER_PIN = "1234";

        document.getElementById('adminAuthForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const inputPin = document.getElementById('adminPin').value;

            if (inputPin === MASTER_PIN) {
                // หากรหัสผ่านถูกต้อง ให้บันทึกเหรียญสิทธิ์ชั่วคราวลงใน Session Storage
                sessionStorage.setItem('admin_authenticated', 'true');
                // ย้ายไปยังหน้าลบข้อมูลระบบทันที
                window.location.href = 'admin-clear.html';
            } else {
                alert('❌ รหัสผ่านผู้ดูแลระบบไม่ถูกต้อง! กรุณาลองใหม่อีกครั้ง');
                document.getElementById('adminPin').value = "";
            }
        });
    </script>
</body>
</html>
