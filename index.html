<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inno Tech Wellness Centre - Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCiJAZhh9hzvvuWDwr4A6sj9m4XPvMyZrM",
            authDomain: "health-tracker-htc.firebaseapp.com",
            databaseURL: "https://health-tracker-htc-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "health-tracker-htc",
            storageBucket: "health-tracker-htc.firebasestorage.app",
            messagingSenderId: "586764059419",
            appId: "1:586764059419:web:50c3cc9e165a0d782d49be",
            measurementId: "G-3VCYGGKJPT"
        };

        const app = initializeApp(firebaseConfig);
        window.db = getDatabase(app); // ทำให้ db เรียกใช้ได้ทั่วถึง
    </script>
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f0f4f8; }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-center items-center p-4 md:p-8 select-none">

    <div class="w-full max-w-[440px]">
        <div class="flex flex-col items-center mb-6 text-center">
            <h1 class="text-xl font-bold text-gray-800 tracking-wide">วิทยาลัยเทคนิคหาดใหญ่</h1>
            <p class="text-xs text-gray-400 font-medium uppercase tracking-wider mb-2">Hatyai Technical College</p>
            <div class="flex items-center space-x-2 mt-1">
                <span class="text-emerald-600 text-sm"><i class="fa-solid fa-heart-pulse"></i></span>
                <span class="text-[11px] font-bold text-gray-500 uppercase tracking-wider">Inno Tech Wellness Centre</span>
            </div>
        </div>

        <div class="bg-white rounded-3xl shadow-xl p-8 border border-gray-50">
            <h2 class="text-2xl font-bold text-gray-800 text-center mb-6 tracking-wide">ลงทะเบียน</h2>
            
            <form id="registerForm" class="space-y-4 text-left">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1.5 ml-1">ชื่อ - นามสกุล</label>
                    <div class="relative">
                        <input id="regName" type="text" placeholder="ระบุชื่อ - นามสกุลของคุณ" required class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 pr-10 text-gray-700 font-medium">
                        <span class="absolute right-4 top-3.5 text-gray-400"><i class="fa-regular fa-id-card"></i></span>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1.5 ml-1">เพศ</label>
                    <div class="relative">
                        <select id="regGender" required class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 text-gray-700 font-medium bg-white">
                            <option value="" disabled selected>เลือกเพศ</option>
                            <option value="ชาย">ชาย</option>
                            <option value="หญิง">หญิง</option>
                            <option value="อื่นๆ">อื่นๆ</option>
                        </select>
                        <span class="absolute right-4 top-3.5 text-gray-400"><i class="fa-solid fa-venus-mars"></i></span>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1.5 ml-1">เบอร์โทรศัพท์</label>
                    <div class="relative">
                        <input id="regPhone" type="tel" placeholder="ระบุเบอร์โทรศัพท์" required pattern="[0-9]{10}" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 pr-10 text-gray-700 font-medium">
                        <span class="absolute right-4 top-3.5 text-gray-400"><i class="fa-solid fa-phone"></i></span>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1.5 ml-1">อีเมล</label>
                    <div class="relative">
                        <input id="regEmail" type="email" placeholder="ตัวอย่างชื่อ@gmail.com" required class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 pr-10 text-gray-700 font-medium">
                        <span class="absolute right-4 top-3.5 text-gray-400"><i class="fa-regular fa-envelope"></i></span>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1.5 ml-1">รหัสผ่าน</label>
                    <div class="relative">
                        <input id="regPassword" type="password" placeholder="ระบุรหัสผ่านระบบ" required class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 pr-10 text-gray-700 font-medium">
                        <span class="absolute right-4 top-3.5 text-gray-400 cursor-pointer hover:text-emerald-600" onclick="togglePassword('regPassword', 'eyeIcon1')" id="eyeIcon1">
                            <i class="fa-solid fa-eye"></i>
                        </span>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1.5 ml-1">ยืนยันรหัสผ่าน</label>
                    <div class="relative">
                        <input id="regConfirmPassword" type="password" placeholder="พิมพ์รหัสผ่านอีกครั้ง" required class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 pr-10 text-gray-700 font-medium">
                        <span class="absolute right-4 top-3.5 text-gray-400 cursor-pointer hover:text-emerald-600" onclick="togglePassword('regConfirmPassword', 'eyeIcon2')" id="eyeIcon2">
                            <i class="fa-solid fa-eye"></i>
                        </span>
                    </div>
                </div>

                <div class="flex items-center space-x-2 text-xs text-gray-500 pt-1">
                    <label class="flex items-center space-x-2 cursor-pointer">
                        <input type="checkbox" class="w-4 h-4 text-emerald-600 border-gray-300 rounded focus:ring-emerald-500" checked required>
                        <span class="font-medium">ฉันยอมรับ <a href="#" class="text-emerald-600 hover:underline">เงื่อนไขการใช้งาน</a></span>
                    </label>
                </div>
                
                <div class="pt-2">
                    <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3.5 rounded-xl transition duration-200 shadow-md">สร้างบัญชีผู้ใช้</button>
                </div>

                <div class="text-center text-xs text-gray-300 font-medium my-3">หรือ</div>
                <div class="text-center text-sm text-gray-600 font-medium">มีบัญชีอยู่แล้ว? <a href="login.html" class="text-emerald-600 font-bold hover:underline ml-1">เข้าสู่ระบบ</a></div>
            </form>
        </div>
    </div>

    <script>
        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const iconContainer = document.getElementById(iconId);
            if (input.type === "password") {
                input.type = "text";
                iconContainer.innerHTML = '<i class="fa-solid fa-eye-slash"></i>';
            } else {
                input.type = "password";
                iconContainer.innerHTML = '<i class="fa-solid fa-eye"></i>';
            }
        }

        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const gender = document.getElementById('regGender').value;
            const phone = document.getElementById('regPhone').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;

            if (password !== confirmPassword) {
                alert('รหัสผ่านและยืนยันรหัสผ่านไม่ตรงกัน');
                return;
            }

            // บันทึกลง Firebase แทน LocalStorage (ใช้ email เป็น key โดยเปลี่ยนจุดเป็นขีดกลาง)
            const emailKey = email.replace(/\./g, '-');
            set(ref(window.db, 'users/' + emailKey), {
                name, email, gender, phone
            }).then(() => {
                localStorage.setItem('currentUser', JSON.stringify({ name, email }));
                alert('ลงทะเบียนสำเร็จ!');
                window.location.href = 'dashboard.html';
            }).catch((error) => {
                alert('เกิดข้อผิดพลาด: ' + error.message);
            });
        });
    </script>
</body>
</html>
