<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inno Tech Wellness Centre - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f0f4f8; }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-center items-center p-4 md:p-8 select-none">

    <div class="w-full max-w-[440px]">
        <div class="flex flex-col items-center mb-6 text-center">
            <h1 class="text-xl font-bold text-gray-800 tracking-wide">วิทยาลัยเทคนิคหาดใหญ่</h1>
            <p class="text-xs text-gray-400 font-medium uppercase tracking-wider mb-2">Hatyai Technical College</p>
            
            <div class="flex items-center space-x-2 mt-1">
                <span class="text-emerald-600 text-sm"><i class="fa-solid fa-heart-pulse"></i></span>
                <span class="text-[11px] font-bold text-gray-500 uppercase tracking-wider">Inno Tech Wellness Centre</span>
            </div>
        </div>

        <div class="bg-white rounded-3xl shadow-xl p-8 border border-gray-50">
            <h2 class="text-2xl font-bold text-gray-800 text-center mb-6 tracking-wide">เข้าสู่ระบบ</h2>
            
            <form id="loginForm" class="space-y-4 text-left">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1.5 ml-1">อีเมล</label>
                    <div class="relative">
                        <input id="loginEmail" type="email" placeholder="กรอกอีเมลของคุณ" required class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 pr-10 text-gray-700 font-medium">
                        <span class="absolute right-4 top-3.5 text-gray-400"><i class="fa-regular fa-envelope"></i></span>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1.5 ml-1">รหัสผ่าน</label>
                    <div class="relative">
                        <input id="loginPassword" type="password" placeholder="กรอกรหัสผ่านของคุณ" required class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 pr-10 text-gray-700 font-medium">
                        <span class="absolute right-4 top-3.5 text-gray-400"><i class="fa-solid fa-lock"></i></span>
                    </div>
                </div>
                
                <div class="flex items-center justify-between text-xs font-semibold text-gray-500 pt-1">
                    <label class="flex items-center space-x-2 cursor-pointer">
                        <input type="checkbox" class="w-4 h-4 text-emerald-600 border-gray-300 rounded focus:ring-emerald-500" checked>
                        <span>จดจำไว้</span>
                    </label>
                    <a href="forgot-password.html" class="hover:underline hover:text-emerald-600">ลืมรหัสผ่าน?</a>
                </div>
                
                <div class="pt-2">
                    <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3.5 rounded-xl transition duration-200 shadow-md">เข้าสู่ระบบ</button>
                </div>
                
                <div class="text-center text-xs text-gray-300 font-medium my-4">หรือ</div>
                
                <div>
                    <a href="index.html" class="w-full bg-white border border-gray-200 text-gray-700 hover:bg-gray-50 font-bold py-3.5 rounded-xl transition duration-200 text-center block shadow-sm">ลงทะเบียนสมาชิกใหม่</a>
                </div>

                <div class="pt-4 border-t border-gray-100 text-center">
                    <a href="admin-clear.html" class="text-[11px] text-gray-300 hover:text-red-400 transition inline-flex items-center gap-1">
                        <i class="fa-solid fa-toolbox"></i> เครื่องมือผู้ดูแลระบบ
                    </a>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            const users = JSON.parse(localStorage.getItem('wellness_users')) || [];
            const matchedUser = users.find(user => user.email === email && user.password === password);

            if (matchedUser) {
                sessionStorage.setItem('current_user', JSON.stringify(matchedUser));
                window.location.href = 'dashboard.html';
            } else {
                alert('อีเมลหรือรหัสผ่านไม่ถูกต้อง กรุณาลองใหม่อีกครั้ง');
            }
        });
    </script>
</body>
</html>
