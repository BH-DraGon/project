<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inno Tech Wellness Centre - Admin Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style> body { font-family: 'Prompt', sans-serif; background-color: #f0f4f8; } </style>
    <script>
        if (sessionStorage.getItem('admin_authenticated') !== 'true') {
            window.location.href = 'admin-auth.html';
        }
    </script>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-2xl mx-auto">
        <div class="bg-white rounded-3xl shadow-xl p-6 md:p-8 border border-gray-50">
            <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">จัดการบัญชีผู้ใช้</h2>
            
            <div class="overflow-x-auto mb-8">
                <table class="w-full text-left">
                    <thead>
                        <tr class="text-gray-400 text-xs uppercase tracking-wider border-b">
                            <th class="pb-3">ชื่อผู้ใช้</th>
                            <th class="pb-3">อีเมล</th>
                            <th class="pb-3 text-center">ลบ</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody" class="text-sm">
                        </tbody>
                </table>
            </div>

            <button onclick="clearAllData()" class="w-full bg-red-50 hover:bg-red-100 text-red-600 font-bold py-3.5 rounded-xl transition border border-red-200">
                <i class="fa-solid fa-trash-can mr-2"></i> ล้างข้อมูลบัญชีทั้งหมด
            </button>
            
            <div class="flex justify-between mt-6 text-xs font-semibold text-gray-400 pt-4 border-t border-gray-100">
                <button onclick="logoutAdmin()" class="hover:text-red-500 transition"><i class="fa-solid fa-lock-open mr-1"></i> ออกจากระบบ</button>
                <a href="index.html" class="hover:text-emerald-600">กลับหน้าหลัก</a>
            </div>
        </div>
    </div>

    <script>
        // โหลดรายชื่อผู้ใช้
        function loadUsers() {
            const users = JSON.parse(localStorage.getItem('wellness_users')) || [];
            const tbody = document.getElementById('userTableBody');
            tbody.innerHTML = '';

            if (users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" class="text-center py-4 text-gray-400">ยังไม่มีผู้ใช้งานในระบบ</td></tr>';
                return;
            }

            users.forEach((user, index) => {
                tbody.innerHTML += `
                    <tr class="border-b border-gray-50">
                        <td class="py-3 font-medium text-gray-700">${user.name || 'ไม่มีชื่อ'}</td>
                        <td class="py-3 text-gray-500">${user.email}</td>
                        <td class="py-3 text-center">
                            <button onclick="deleteSingleUser(${index})" class="text-red-400 hover:text-red-600 p-2">
                                <i class="fa-solid fa-user-minus"></i>
                            </button>
                        </td>
                    </tr>
                `;
            });
        }

        // ลบเฉพาะคน
        function deleteSingleUser(index) {
            if (confirm('ต้องการลบบัญชีนี้ออกจากระบบใช่หรือไม่?')) {
                let users = JSON.parse(localStorage.getItem('wellness_users'));
                users.splice(index, 1);
                localStorage.setItem('wellness_users', JSON.stringify(users));
                loadUsers();
            }
        }

        // ลบทั้งหมด
        function clearAllData() {
            if (confirm('⚠️ คำเตือน: คุณต้องการลบข้อมูลผู้ใช้ "ทั้งหมด" ใช่หรือไม่?')) {
                localStorage.removeItem('wellness_users');
                loadUsers();
                alert('ลบข้อมูลทั้งหมดเรียบร้อยแล้ว');
            }
        }

        function logoutAdmin() {
            sessionStorage.removeItem('admin_authenticated');
            window.location.href = 'login.html';
        }

        loadUsers(); // เรียกใช้งานเมื่อโหลดหน้า
    </script>
</body>
</html>
