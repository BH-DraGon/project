<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inno Tech Wellness Centre | ลืมรหัสผ่าน</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Prompt', sans-serif; background: linear-gradient(135deg, #ecfdf5 0%, #f1f5f9 100%); }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-emerald-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-emerald-200">
                <i class="fa-solid fa-heart-pulse text-white text-3xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-slate-800">Inno Tech Wellness</h1>
            <p class="text-slate-500 text-sm">วิทยาลัยเทคนิคหาดใหญ่</p>
        </div>

        <div class="glass p-8 rounded-3xl shadow-xl border border-white/50">
            <h2 id="title-text" class="text-xl font-bold text-slate-800 mb-2">ลืมรหัสผ่าน</h2>
            <p id="step-description" class="text-sm text-slate-500 mb-6">กรอกอีเมลของคุณเพื่อดำเนินการต่อ</p>
            
            <form id="forgotForm" class="space-y-4">
                <div id="step-1-fields">
                    <input id="forgotEmail" type="email" placeholder="อีเมลที่ลงทะเบียนไว้" required class="w-full px-4 py-3 bg-white/50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none transition">
                </div>

                <div id="step-2-fields" class="hidden">
                    <input id="otpInput" type="text" maxlength="6" placeholder="รหัส OTP 6 หลัก" class="w-full px-4 py-3 bg-white/50 border border-slate-200 rounded-xl text-center text-xl font-bold tracking-[0.5em] outline-none focus:ring-2 focus:ring-emerald-500 transition">
                </div>

                <div id="step-3-fields" class="hidden space-y-3">
                    <input id="newPassword" type="password" placeholder="รหัสผ่านใหม่" class="w-full px-4 py-3 bg-white/50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-emerald-500">
                    <input id="confirmNewPassword" type="password" placeholder="ยืนยันรหัสผ่านใหม่" class="w-full px-4 py-3 bg-white/50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-emerald-500">
                </div>
                
                <div class="flex gap-3 pt-2">
                    <button id="backBtn" type="button" onclick="goBack()" class="hidden w-1/4 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-3 rounded-xl transition">
                        <i class="fa-solid fa-arrow-left"></i>
                    </button>
                    <button id="submitBtn" type="submit" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl transition shadow-lg shadow-emerald-200">
                        <span id="btn-text">ดำเนินการต่อ</span>
                    </button>
                </div>
            </form>
        </div>
        
        <p class="text-center text-slate-400 text-xs mt-8">© 2026 Inno Tech Wellness Centre</p>
    </div>

    <script>
        (function() { emailjs.init("_OUYCy0aIXwZfI8yv"); })();

        let currentStep = 1;
        let generatedOTP = "";
        let matchedUserIndex = -1;

        function goBack() {
            if (currentStep === 2) {
                currentStep = 1;
                document.getElementById('step-2-fields').classList.add('hidden');
                document.getElementById('step-1-fields').classList.remove('hidden');
                document.getElementById('backBtn').classList.add('hidden');
                document.getElementById('forgotEmail').disabled = false;
                document.getElementById('title-text').textContent = "ลืมรหัสผ่าน";
                document.getElementById('btn-text').textContent = "ดำเนินการต่อ";
            } else if (currentStep === 3) {
                currentStep = 2;
                document.getElementById('step-3-fields').classList.add('hidden');
                document.getElementById('step-2-fields').classList.remove('hidden');
                document.getElementById('title-text').textContent = "ยืนยันตัวตน";
                document.getElementById('btn-text').textContent = "ยืนยันรหัส OTP";
            }
        }

        document.getElementById('forgotForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const users = JSON.parse(localStorage.getItem('wellness_users')) || [];

            if (currentStep === 1) {
                const email = document.getElementById('forgotEmail').value.trim();
                matchedUserIndex = users.findIndex(u => u.email === email);
                if (matchedUserIndex === -1) return alert('ไม่พบอีเมลนี้ในระบบ');

                generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();
                document.getElementById('btn-text').textContent = "กำลังส่ง...";

                emailjs.send("service_bd51lbc", "template_rgyde0p", {
                    to_email: email,
                    otp_code: generatedOTP,
                    user_name: users[matchedUserIndex].name
                }).then(() => {
                    currentStep = 2;
                    document.getElementById('step-1-fields').classList.add('hidden');
                    document.getElementById('step-2-fields').classList.remove('hidden');
                    document.getElementById('backBtn').classList.remove('hidden');
                    document.getElementById('title-text').textContent = "ยืนยันตัวตน";
                    document.getElementById('step-description').textContent = "กรอกรหัส 6 หลักที่ส่งไปยังอีเมลของคุณ";
                    document.getElementById('btn-text').textContent = "ยืนยันรหัส OTP";
                }, () => alert("ส่งอีเมลล้มเหลว"));

            } else if (currentStep === 2) {
                if (document.getElementById('otpInput').value === generatedOTP) {
                    currentStep = 3;
                    document.getElementById('step-2-fields').classList.add('hidden');
                    document.getElementById('step-3-fields').classList.remove('hidden');
                    document.getElementById('title-text').textContent = "กำหนดรหัสผ่านใหม่";
                    document.getElementById('btn-text').textContent = "บันทึกรหัสผ่าน";
                } else {
                    alert('รหัส OTP ไม่ถูกต้อง');
                }
            } else {
                const pass = document.getElementById('newPassword').value;
                if (pass !== document.getElementById('confirmNewPassword').value) return alert('รหัสผ่านไม่ตรงกัน');
                
                users[matchedUserIndex].password = pass;
                localStorage.setItem('wellness_users', JSON.stringify(users));
                alert('เปลี่ยนรหัสผ่านสำเร็จ!');
                window.location.href = 'login.html';
            }
        });
    </script>
</body>
</html>
